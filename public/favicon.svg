<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Candy wrapper -->
  <defs>
    <linearGradient id="candy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="50%" style="stop-color:#c86bff"/>
      <stop offset="100%" style="stop-color:#6bb5ff"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Wrapper twist left -->
  <path d="M8 32 L18 26 L18 38 Z" fill="url(#candy)" opacity="0.8"/>
  <path d="M4 32 L12 28 L12 36 Z" fill="url(#candy)" opacity="0.6"/>

  <!-- Wrapper twist right -->
  <path d="M56 32 L46 26 L46 38 Z" fill="url(#candy)" opacity="0.8"/>
  <path d="M60 32 L52 28 L52 36 Z" fill="url(#candy)" opacity="0.6"/>

  <!-- Candy body -->
  <ellipse cx="32" cy="32" rx="16" ry="14" fill="url(#candy)"/>

  <!-- The void (eye) - subtle -->
  <ellipse cx="32" cy="32" rx="6" ry="5" fill="url(#dark)"/>
  <circle cx="32" cy="32" r="2" fill="#33ff33" opacity="0.9"/>

  <!-- Highlight -->
  <ellipse cx="27" cy="27" rx="3" ry="2" fill="white" opacity="0.4"/>
</svg>