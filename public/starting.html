<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting Server...</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050508;
      --bg-surface: #0a0a0f;
      --bg-elevated: #12121a;
      --bg-card: #16161f;
      --border: #1e1e2a;
      --border-bright: #2a2a3a;
      --text: #e0e0e8;
      --text-dim: #6a6a7a;
      --text-muted: #4a4a5a;
      --cyan: #00e5ff;
      --cyan-dim: #00a0b0;
      --cyan-glow: rgba(0, 229, 255, 0.15);
      --magenta: #ff00aa;
      --magenta-dim: #a0006a;
      --magenta-glow: rgba(255, 0, 170, 0.15);
      --green: #00ff6a;
      --yellow: #ffcc00;
      --red: #ff3366;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      --font-sans: 'Space Grotesk', system-ui, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-mono);
      background: var(--bg-deep);
      color: var(--text);
      padding: 1.5rem;
      overflow-x: hidden;
    }

    /* Scanline effect */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.1) 2px,
        rgba(0, 0, 0, 0.1) 4px
      );
      pointer-events: none;
      z-index: 9999;
      opacity: 0.3;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .spinner-container {
      width: 40px;
      height: 40px;
      position: relative;
    }

    .spinner {
      position: absolute;
      inset: 0;
      border: 3px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .spinner-inner {
      position: absolute;
      inset: 6px;
      border: 2px solid var(--border);
      border-top-color: var(--magenta);
      border-radius: 50%;
      animation: spin 0.6s linear infinite reverse;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-family: var(--font-sans);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
    }

    .domain {
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan-glow);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .status-pill.detecting {
      border-color: var(--yellow);
      color: var(--yellow);
      background: rgba(255, 204, 0, 0.1);
    }

    .status-pill.success {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0, 255, 106, 0.1);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1.5rem;
      height: calc(100vh - 140px);
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
        height: auto;
      }
    }

    .logs-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 400px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1rem;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .panel-badge {
      font-size: 0.65rem;
      padding: 0.25rem 0.5rem;
      background: var(--bg-card);
      border-radius: 4px;
      color: var(--text-muted);
    }

    .logs-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      font-size: 0.8rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text-dim);
    }

    .logs-content::-webkit-scrollbar {
      width: 6px;
    }

    .logs-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .logs-content::-webkit-scrollbar-thumb {
      background: var(--border-bright);
      border-radius: 3px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }

    .card-title {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .port-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .port-btn {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.625rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--cyan);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .port-btn:hover {
      background: var(--cyan);
      color: var(--bg-deep);
      border-color: var(--cyan);
      box-shadow: 0 0 20px var(--cyan-glow);
    }

    .no-ports {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
      padding: 0.5rem 0;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
    }

    .input-group input {
      flex: 1;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      border-color: var(--cyan-dim);
      box-shadow: 0 0 0 3px var(--cyan-glow);
    }

    .input-group input::placeholder {
      color: var(--text-muted);
    }

    .input-group button {
      background: linear-gradient(135deg, var(--cyan) 0%, var(--cyan-dim) 100%);
      border: none;
      border-radius: 8px;
      padding: 0 1.25rem;
      color: var(--bg-deep);
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .input-group button:hover {
      box-shadow: 0 0 20px var(--cyan-glow);
    }

    .actions-card {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      border-color: var(--border-bright);
      color: var(--text);
    }

    .action-btn.kill {
      border-color: rgba(255, 51, 102, 0.3);
      color: var(--red);
    }

    .action-btn.kill:hover {
      background: rgba(255, 51, 102, 0.1);
      border-color: var(--red);
    }

    .action-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .redirect-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 8, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .redirect-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .redirect-content {
      text-align: center;
    }

    .redirect-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border: 3px solid var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(0, 255, 106, 0.3);
      animation: scaleIn 0.3s ease;
    }

    @keyframes scaleIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    .redirect-icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--green);
      stroke-width: 3;
      fill: none;
    }

    .redirect-text {
      font-family: var(--font-sans);
      font-size: 1.25rem;
      color: var(--text);
    }

    .redirect-port {
      color: var(--green);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="spinner-container">
          <div class="spinner"></div>
          <div class="spinner-inner"></div>
        </div>
        <h1>Starting <span class="domain" id="serverName">server</span>.localhost</h1>
      </div>
      <div class="status-pill detecting" id="statusPill">
        <span class="status-dot"></span>
        <span id="statusText">Detecting port...</span>
      </div>
    </header>

    <div class="main-grid">
      <div class="logs-panel">
        <div class="panel-header">
          <span class="panel-title">Server Output</span>
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            <span class="panel-badge" style="background: var(--magenta-glow); color: var(--magenta); border: 1px solid var(--magenta-dim);">PTY</span>
            <span class="panel-badge">LIVE</span>
          </div>
        </div>
        <div style="font-size: 0.65rem; color: var(--text-muted); padding: 0.5rem 1rem; background: var(--bg-elevated); border-bottom: 1px solid var(--border);">keystrokes go directly to terminal</div>
        <div class="logs-content" id="logsContent"></div>
      </div>

      <div class="sidebar">
        <div class="card">
          <div class="card-title">Port Selection</div>
          <div class="port-grid" id="detectedPorts">
            <span class="no-ports">Scanning for ports...</span>
          </div>
          <div class="input-group">
            <input type="number" id="manualPort" placeholder="Enter port" min="1024" max="65535">
            <button onclick="setPort()">Connect</button>
          </div>
        </div>

        <div class="card actions-card">
          <button class="action-btn" onclick="location.reload()">
            <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Retry Detection
          </button>
          <button class="action-btn kill" id="killBtn">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Kill Process
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="redirect-overlay" id="redirectOverlay">
    <div class="redirect-content">
      <div class="redirect-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="redirect-text">Port <span class="redirect-port" id="detectedPort">3000</span> detected</div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:9999';
    const vars = window.CANDY_VARS || { name: 'unknown', detectedPorts: [], returnPath: '/' };
    let currentToken = window.CANDY_TOKEN;
    const serverName = vars.name;
    const returnPath = vars.returnPath || '/';

    // Token management - rolling one-time-use tokens
    async function refreshToken() {
      if (!currentToken) return;
      try {
        const res = await fetch(API + '/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: currentToken })
        });
        if (res.ok) {
          const data = await res.json();
          currentToken = data.token;
        }
      } catch (e) {
        console.error('Token refresh failed:', e);
      }
    }

    // Wrapper for API calls with token
    async function apiCall(endpoint, options = {}) {
      const headers = {
        ...options.headers,
        'X-Candy-Token': currentToken
      };
      const res = await fetch(API + endpoint, { ...options, headers });

      if (res.ok) {
        await refreshToken();
      } else if (res.status === 401) {
        await refreshToken();
        if (currentToken) {
          headers['X-Candy-Token'] = currentToken;
          const retry = await fetch(API + endpoint, { ...options, headers });
          if (retry.ok) await refreshToken();
          return retry;
        }
      }
      return res;
    }

    document.getElementById('serverName').textContent = serverName;
    document.getElementById('killBtn').onclick = () => {
      location.href = `http://kill.${serverName}.localhost`;
    };

    function updatePorts(ports) {
      const container = document.getElementById('detectedPorts');
      if (ports && ports.length > 0) {
        container.innerHTML = ports.map(port =>
          `<button class="port-btn" onclick="selectPort(${port})">${port}</button>`
        ).join('');
      } else {
        container.innerHTML = '<span class="no-ports">Scanning for ports...</span>';
      }
    }

    updatePorts(vars.detectedPorts);

    async function selectPort(port) {
      document.getElementById('manualPort').value = port;
      await setPort();
    }

    async function setPort() {
      const port = parseInt(document.getElementById('manualPort').value);
      if (!port || port < 1024 || port > 65535) {
        alert('Please enter a valid port (1024-65535)');
        return;
      }

      try {
        const res = await apiCall(`/process/port/${serverName}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ port })
        });

        if (res.ok) {
          location.href = `https://${serverName}.localhost${returnPath}`;
        } else {
          const data = await res.json();
          alert('Failed to set port: ' + (data.error || 'Unknown error'));
        }
      } catch (e) {
        alert('Failed to set port: ' + e.message);
      }
    }

    const eventSource = new EventSource(API + `/stream/${serverName}`);

    eventSource.onmessage = (event) => {
      const content = JSON.parse(event.data);
      const logsEl = document.getElementById('logsContent');
      logsEl.textContent += content;
      logsEl.scrollTop = logsEl.scrollHeight;
    };

    eventSource.addEventListener('status', (event) => {
      const status = JSON.parse(event.data);
      const statusPill = document.getElementById('statusPill');
      const statusText = document.getElementById('statusText');

      if (status.status === 'running' && status.port) {
        statusText.textContent = `Port ${status.port} ready`;
        statusPill.className = 'status-pill success';
        document.getElementById('detectedPort').textContent = status.port;
        document.getElementById('redirectOverlay').classList.add('visible');
        eventSource.close();
        setTimeout(() => {
          location.href = `https://${serverName}.localhost${returnPath}`;
        }, 1200);
      } else if (status.status === 'errored' || status.status === 'dead') {
        statusText.textContent = 'Process stopped';
        eventSource.close();
        setTimeout(() => location.reload(), 1500);
      } else {
        updatePorts(status.detectedPorts);
      }
    });

    eventSource.onerror = () => {
      document.getElementById('statusText').textContent = 'Connection lost';
    };

    // PTY input - send all keystrokes to terminal
    document.addEventListener('keydown', async (e) => {
      // Don't capture if typing in an input field
      if (e.target.tagName === 'INPUT') return;

      e.preventDefault();

      // Build the input to send
      let input = null;
      let key = null;

      // Handle Ctrl combinations
      if (e.ctrlKey) {
        const ctrlKeys = {
          'c': 'ctrl+c',
          'd': 'ctrl+d',
          'z': 'ctrl+z',
          'l': 'ctrl+l',
        };
        if (ctrlKeys[e.key.toLowerCase()]) {
          key = ctrlKeys[e.key.toLowerCase()];
        }
      } else if (e.key === 'Enter') {
        input = '\n';
      } else if (e.key === 'Tab') {
        key = 'tab';
      } else if (e.key === 'Backspace') {
        key = 'backspace';
      } else if (e.key === 'ArrowUp') {
        key = 'up';
      } else if (e.key === 'ArrowDown') {
        key = 'down';
      } else if (e.key === 'ArrowLeft') {
        key = 'left';
      } else if (e.key === 'ArrowRight') {
        key = 'right';
      } else if (e.key.length === 1) {
        // Regular character
        input = e.key;
      }

      if (input !== null || key !== null) {
        try {
          const body = key ? { key } : { input };
          await apiCall(`/process/input/${serverName}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
        } catch (err) {
          console.error('PTY input failed:', err);
        }
      }
    });
  </script>
</body>
</html>
